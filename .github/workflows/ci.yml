name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
      - name: Build
        run: CGO_ENABLED=0 go build ./...
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./...
