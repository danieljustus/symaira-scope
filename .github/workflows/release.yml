name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    environment: release
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Import signing certificate
        id: signing
        env:
          CERTIFICATE_P12: ${{ secrets.CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [ -z "${CERTIFICATE_P12:-}" ]; then
            echo "::warning::CERTIFICATE_P12 secret is not set. Building unsigned."
            echo "signed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "signed=true" >> "$GITHUB_OUTPUT"
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          CERTIFICATE_PATH="$RUNNER_TEMP/certificate.p12"
          echo -n "$CERTIFICATE_P12" | base64 --decode -o "$CERTIFICATE_PATH"
          security import "$CERTIFICATE_PATH" -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep "Developer ID Application" | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "CODESIGN_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - uses: actions/setup-go@v7
        with:
          go-version: "1.26.x"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

      - name: Notarize macOS binaries
        if: steps.signing.outputs.signed == 'true'
        env:
          NOTARY_API_KEY: ${{ secrets.NOTARY_API_KEY }}
          NOTARY_API_ISSUER: ${{ secrets.NOTARY_API_ISSUER }}
          NOTARY_API_KEY_ID: ${{ secrets.NOTARY_API_KEY_ID }}
        run: |
          if [ -z "${NOTARY_API_KEY:-}" ]; then
            echo "::warning::NOTARY_API_KEY secret is not set. Skipping notarization."
            exit 0
          fi
          for ARCH in amd64 arm64; do
            for f in dist/*_darwin_${ARCH}/*; do
              if [ -f "$f" ] && file "$f" | grep -q "Mach-O"; then
                echo "Notarizing $f..."
                ZIP_PATH="$RUNNER_TEMP/notarize_${ARCH}.zip"
                ditto -c -k --keepParent "$f" "$ZIP_PATH"
                xcrun notarytool submit "$ZIP_PATH" \
                  --apple-id "${NOTARY_API_KEY_ID}" \
                  --team-id "${NOTARY_API_ISSUER}" \
                  --password "${NOTARY_API_KEY}" \
                  --wait
                rm -f "$ZIP_PATH"
              fi
            done
          done

      - name: Configure git credentials for private SPM dependencies
        env:
          APPKIT_GITHUB_TOKEN: ${{ secrets.APPKIT_GITHUB_TOKEN }}
        run: |
          if [ -z "${APPKIT_GITHUB_TOKEN:-}" ]; then
            echo "::error::APPKIT_GITHUB_TOKEN secret is not set. Swift Package resolution of the private symaira-appkit dependency will fail."
            exit 1
          fi
          git config --global "http.https://github.com/.extraheader" "AUTHORIZATION: basic $(printf 'x-access-token:%s' "$APPKIT_GITHUB_TOKEN" | base64)"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: |
          cd client
          xcodegen generate

      - name: Build and archive Swift App (signed)
        if: steps.signing.outputs.signed == 'true'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          xcodebuild archive \
            -project client/Symscope.xcodeproj \
            -scheme Symscope \
            -archivePath client/build/release/Symscope.xcarchive \
            -configuration Release \
            MARKETING_VERSION="${VERSION}" \
            CURRENT_PROJECT_VERSION="${GITHUB_RUN_NUMBER}" \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGNING_ALLOWED=YES

      - name: Export Swift App (signed)
        if: steps.signing.outputs.signed == 'true'
        run: |
          cat > client/build/release/ExportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>developer-id</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>signingCertificate</key>
              <string>Developer ID Application</string>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath client/build/release/Symscope.xcarchive \
            -exportOptionsPlist client/build/release/ExportOptions.plist \
            -exportPath client/build/release/export

      - name: Build Swift App (unsigned)
        if: steps.signing.outputs.signed == 'false'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          xcodebuild build \
            -project client/Symscope.xcodeproj \
            -scheme Symscope \
            -configuration Release \
            -derivedDataPath client/build/release/DerivedData \
            MARKETING_VERSION="${VERSION}" \
            CURRENT_PROJECT_VERSION="${GITHUB_RUN_NUMBER}" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
          APP_PATH=$(find client/build/release/DerivedData -name "Symscope.app" -type d | head -1)
          mkdir -p client/build/release/export
          cp -R "$APP_PATH" client/build/release/export/

      - name: Notarize and staple Swift App
        if: steps.signing.outputs.signed == 'true'
        env:
          NOTARY_API_KEY: ${{ secrets.NOTARY_API_KEY }}
          NOTARY_API_ISSUER: ${{ secrets.NOTARY_API_ISSUER }}
          NOTARY_API_KEY_ID: ${{ secrets.NOTARY_API_KEY_ID }}
        run: |
          APP_PATH=$(find client/build/release/export -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "::error::No .app found for notarization."
            exit 1
          fi
          if [ -z "${NOTARY_API_KEY:-}" ]; then
            echo "::warning::NOTARY_API_KEY secret is not set. Skipping notarization."
            exit 0
          fi
          xcrun notarytool submit "$APP_PATH" \
            --apple-id "${NOTARY_API_KEY_ID}" \
            --team-id "${NOTARY_API_ISSUER}" \
            --password "${NOTARY_API_KEY}" \
            --wait
          xcrun stapler staple "$APP_PATH"

      - name: Create DMG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          APP_PATH=$(find client/build/release/export -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "::error::No .app found for DMG creation."
            exit 1
          fi
          hdiutil create -volname "Symscope" \
            -srcfolder "$APP_PATH" \
            -ov -format UDZO \
            "client/build/release/Symscope-${VERSION}.dmg"

      - name: Upload DMG to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DMG_PATH="client/build/release/Symscope-${VERSION}.dmg"
          gh release upload "v${VERSION}" \
            "${DMG_PATH}#Symscope-${VERSION}.dmg" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber

      - name: Clean up signing material
        if: always()
        run: |
          if [ -n "${KEYCHAIN_PATH:-}" ] && [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          fi
          git config --global --unset-all "http.https://github.com/.extraheader" 2>/dev/null || true
