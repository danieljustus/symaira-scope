# GoReleaser configuration for symscope
# Cross-compile macOS/Linux/Windows (CGO-free), archives, Homebrew formula.
# See https://goreleaser.com

version: 2

builds:
  - id: symscope
    binary: symscope
    main: ./cmd/symscope
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}
    hooks:
      post:
        - cmd: |
            if [ "{{ .Os }}" = "darwin" ] && [ -n "${CODESIGN_IDENTITY:-}" ]; then
              codesign -s "$CODESIGN_IDENTITY" --timestamp --options runtime "{{ .Path }}"
              echo "Signed {{ .Path }}"
            fi

archives:
  - id: default
    formats: ["tar.gz"]
    format_overrides:
      - goos: windows
        formats: ["zip"]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^build\\(deps\\):"

release:
  github:
    owner: danieljustus
    name: symaira-scope
  draft: false
  prerelease: auto

brews:
  - name: symscope
    repository:
      owner: danieljustus
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: https://github.com/danieljustus/symaira-scope
    description: Cross-platform port inventory and MCP discovery tool for AI agents
    license: MIT
    test: |
      system "#{bin}/symscope", "version"
